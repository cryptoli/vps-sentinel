name: ci

on:
  push:
  pull_request:

jobs:
  panel-ui:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: panel/ui/package-lock.json
      - name: Install panel UI dependencies
        working-directory: panel/ui
        run: npm ci
      - name: Panel contract generated files
        run: node scripts/generate-panel-contract.mjs --check
      - name: Panel UI typecheck
        working-directory: panel/ui
        run: npm run typecheck
      - name: Panel UI build
        working-directory: panel/ui
        run: npm run build

  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Panel contract generated files
        run: node scripts/generate-panel-contract.mjs --check
      - name: Format
        run: cargo fmt --check
      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: Test
        run: cargo test --workspace
      - name: Release build
        run: cargo build --release --locked
      - name: Shell script syntax
        run: |
          bash -n install.sh
          bash -n update.sh
          bash -n stop.sh
          bash -n scripts/create-panel-env.sh
          bash -n tests/install_script_smoke.sh
      - name: Installer smoke test
        run: bash tests/install_script_smoke.sh

  linux-compat:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: debian-bookworm
            image: rust:1-bookworm
            setup: apt-get update && apt-get install -y --no-install-recommends pkg-config ca-certificates
          - name: alpine-musl
            image: rust:1-alpine
            setup: apk add --no-cache build-base pkgconfig ca-certificates
    steps:
      - uses: actions/checkout@v4
      - name: Test on ${{ matrix.name }}
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/src:ro" \
            "${{ matrix.image }}" \
            sh -c "set -eu; ${{ matrix.setup }}; mkdir -p /work; cp -a /src/. /work/; cd /work; cargo test --workspace --locked"
