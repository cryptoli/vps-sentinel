<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>vps-sentinel panel</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%230b1220'/%3E%3Cpath d='M18 18h28v8H27v8h15v8H18z' fill='%231570ef'/%3E%3Cpath d='M24 46h22v-8H33v-8H24z' fill='%2322c55e'/%3E%3C/svg%3E" />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="brand">
        <span class="brand-mark" aria-hidden="true">VS</span>
        <div>
          <h1>vps-sentinel</h1>
          <p data-i18n="subtitle">Fleet security signal panel</p>
        </div>
      </div>
      <div class="toolbar">
        <select id="theme-select" aria-label="Theme"></select>
        <select id="language-select" aria-label="Language"></select>
        <button id="refresh-button" type="button">Refresh</button>
      </div>
    </header>
    <main class="layout">
      <nav id="nav" class="sidebar" aria-label="Panel navigation"></nav>
      <section id="app" class="content" aria-live="polite"></section>
    </main>
    <script type="module" src="/app.js"></script>
  </body>
</html>
