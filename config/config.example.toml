[agent]
host_id = ""
hostname = ""
display_name = ""
scan_interval_seconds = 60
data_dir = "/var/lib/vps-sentinel"
log_level = "info"

[privacy]
upload_logs = false
mask_ip = false
mask_command_args = false

[performance]
collect_memory_metrics = true
store_raw_log_lines = false
store_all_web_access_events = false
max_stored_field_bytes = 4096

[resource_budget]
enabled = true
max_raw_events_per_scan = 20000
max_findings_per_scan = 500
max_evidence_items_per_finding = 64
max_evidence_value_bytes = 2048

[storage]
type = "sqlite"
path = "/var/lib/vps-sentinel/sentinel.db"
retention_days = 30
max_database_size_mb = 256

[ssh]
enabled = true
auth_log_paths = ["/var/log/auth.log", "/var/log/secure"]
monitor_authorized_keys = true
alert_on_root_login = true
alert_on_password_login = true
alert_on_successful_login = true
auth_log_lookback_seconds = 300
failed_login_threshold = 6
failed_login_window_seconds = 300
max_events_per_scan = 2000
trusted_admin_ips = []
alert_on_trusted_admin_login = false

[file_integrity]
enabled = true
max_file_size_mb = 5
max_depth = 8
webshell_min_score = 70
incremental = true
paths = [
  "/etc/passwd",
  "/etc/shadow",
  "/etc/group",
  "/etc/sudoers",
  "/etc/sudoers.d",
  "/etc/ssh/sshd_config",
  "/etc/ssh/sshd_config.d",
  "/etc/systemd/system",
  "/etc/crontab",
  "/etc/cron.d",
  "/var/spool/cron",
  "/root/.ssh",
  "/home/*/.ssh"
]

[log_integrity]
enabled = true
paths = ["/var/log/auth.log", "/var/log/secure", "/var/log/wtmp", "/var/log/btmp", "/var/log/lastlog"]
truncate_drop_percent = 90
truncate_min_drop_bytes = 262144
rotation_grace_seconds = 900

[web]
enabled = true
web_roots = ["/var/www", "/srv", "/usr/share/nginx/html", "/usr/share/httpd/noindex"]
max_log_tail_bytes = 1048576
max_events_per_scan = 5000
include_rotated = true
log_lookback_seconds = 900
error_burst_threshold = 20
trusted_proxy_cidrs = ["173.245.48.0/20", "103.21.244.0/22", "103.22.200.0/22", "103.31.4.0/22", "141.101.64.0/18", "108.162.192.0/18", "190.93.240.0/20", "188.114.96.0/20", "197.234.240.0/22", "198.41.128.0/17", "162.158.0.0/15", "104.16.0.0/13", "104.24.0.0/14", "172.64.0.0/13", "131.0.72.0/22", "2400:cb00::/32", "2606:4700::/32", "2803:f800::/32", "2405:b500::/32", "2405:8100::/32", "2a06:98c0::/29", "2c0f:f248::/32"]
real_client_ip_fields = ["cf_connecting_ip", "http_cf_connecting_ip", "x_forwarded_for", "http_x_forwarded_for", "x_real_ip", "http_x_real_ip", "request.headers.cf-connecting-ip", "request.headers.x-forwarded-for", "request.headers.x-real-ip", "headers.cf-connecting-ip", "headers.x-forwarded-for", "headers.x-real-ip"]
suppress_unresolved_trusted_proxy = true
log_paths = [
  "/var/log/nginx/access.log",
  "/var/log/nginx/error.log",
  "/var/log/caddy/access.log",
  "/var/log/apache2/access.log"
]

[process]
enabled = true
high_cpu_threshold_percent = 80.0
high_cpu_duration_seconds = 120
deleted_executable_min_score = 70
behavior_min_score = 70
suspicious_socket_fd_threshold = 20
public_outbound_fanout_threshold = 12
outbound_remote_addr_sample_size = 16
suspicious_dirs = ["/tmp", "/var/tmp", "/dev/shm", "/run"]
known_bad_tool_names = ["xmrig", "xmr-stak", "kinsing", "masscan", "zmap", "lolminer", "nbminer", "gminer", "t-rex", "trex", "teamredminer", "phoenixminer", "ethminer", "ccminer", "cpuminer", "bminer", "nanominer", "wildrig", "rigel", "bzminer"]

[gpu]
enabled = true
nvidia_smi_path = "nvidia-smi"
rocm_smi_path = "rocm-smi"
command_timeout_seconds = 2
min_memory_mb = 256
high_utilization_percent = 85
high_power_watts = 120.0
mining_min_score = 80
mining_pool_ports = [3333, 3334, 3335, 4444, 5555, 7777, 8888, 9999, 14444, 16000, 18081, 18082]

[package_manager]
enabled = true
log_paths = [
  "/var/log/dpkg.log",
  "/var/log/apt/history.log",
  "/var/log/yum.log",
  "/var/log/dnf.log",
  "/var/log/pacman.log",
  "/var/log/apk.log"
]
recent_activity_window_seconds = 3600
max_log_tail_bytes = 8192

[network]
enabled = true
alert_on_new_listening_port = true
expected_public_ports = [22, 80, 443]
high_risk_public_ports = [11211, 2375, 2376, 2379, 2380, 3000, 3306, 3389, 5432, 5601, 5672, 5900, 5901, 5984, 5985, 5986, 6379, 6443, 9090, 9200, 9300, 10250, 10255, 15672, 27017, 27018, 27019]
public_listen_allowlist = [22, 80, 443]

[persistence]
enabled = true
monitor_cron = true
monitor_systemd = true
monitor_shell_profile = true
monitor_ld_preload = true
suspicious_command_min_score = 70

[docker]
enabled = true
alert_on_privileged_container = true
alert_on_docker_socket_mount = true
alert_on_host_network = true

[notifications]
request_timeout_seconds = 15
language = "zh_cn" # zh_cn or en
time_zone = "local" # local or utc
include_technical_fields = false

[notifications.telegram]
enabled = false
bot_token = ""
chat_id = ""
min_severity = "Medium"

[notifications.email]
enabled = false
smtp_host = ""
smtp_port = 587
tls_mode = "start_tls"
username = ""
password = ""
from = ""
to = []
subject_prefix = "[vps-sentinel]"
min_severity = "High"

[notifications.webhook]
enabled = false
url = ""
secret = ""
min_severity = "Medium"

[notifications.ntfy]
enabled = false
server = "https://ntfy.sh"
topic = ""
token = ""
min_severity = "Medium"

[notifications.gotify]
enabled = false
server = ""
token = ""
min_severity = "Medium"

[notifications.bark]
enabled = false
server = "https://api.day.app"
device_key = ""
min_severity = "Medium"

[notifications.serverchan]
enabled = false
send_key = ""
min_severity = "Medium"

[noise_control]
dedup_window_seconds = 3600
state_reminder_interval_seconds = 86400
max_alerts_per_hour = 30
rate_limit_bypass_min_severity = "High"
quiet_hours_bypass_min_severity = "High"
quiet_hours = [] # Example: ["22:00-07:00"]

[active_response]
enabled = true
strategy = "balanced" # observe, balanced, or strict
firewall_backend = "auto" # auto, nftables, or iptables
cleanup_legacy_port_guards = true
block_ttl_seconds = 3600
command_timeout_seconds = 3
max_blocks_per_scan = 20
notification_detail_limit = 3
permanent_block_enabled = true
permanent_block_threshold = 3
permanent_block_window_seconds = 86400
web_enabled = true
web_probe_block_threshold = 25
web_exploit_block_threshold = 5
ssh_enabled = true
ssh_failed_login_block_threshold = 6

[attack_fingerprints]
enabled = true
similarity_enabled = true
similarity_hamming_distance = 6
max_match_candidates = 1000
max_features_per_fingerprint = 40
max_observations_per_fingerprint = 200
retention_days = 30
active_response_enabled = true
active_response_min_score = 75
active_response_min_observations = 2
active_response_min_distinct_ips = 2

[response_policy]
enabled = true

[response_policy.policies.ssh_bruteforce]
enabled = true
rule_ids = ["SSH-003", "SSH-007"]
categories = []
action = "block" # observe, block, or permanent_block
min_severity = "High"
min_confidence = 70
min_unified_score = 70

[response_policy.policies.web_attack]
enabled = true
rule_ids = ["WEB-001", "WEB-002"]
categories = []
action = "block" # observe, block, or permanent_block
min_severity = "Low"
min_confidence = 35
min_unified_score = 30

[incidents]
enabled = true
correlation_window_seconds = 900
max_findings_per_incident = 50

[service_profile]
enabled = true
drift_requires_public_exposure = false
baseline_refresh_after_package_activity = false
dynamic_udp_enabled = true
dynamic_udp_min_port = 1024
dynamic_udp_max_port_samples = 32
unknown_owner_grace_observations = 3
ignored_dynamic_udp_process_names = ["systemd-timesyncd", "chronyd", "ntpd"]
ignore_loopback_ssh_forwarding = true

[behavior_profile]
enabled = true
min_observations_before_drift = 3
max_process_identities = 512
max_remote_ports_per_identity = 32
max_executable_samples_per_identity = 8
max_age_days = 30
public_fanout_multiplier = 3
public_fanout_min_delta = 8

[reports]
scheduled_enabled = true
scheduled_hour = 8
scheduled_period = "today" # today or last24h
min_interval_seconds = 82800

[advanced_collectors]
auditd_enabled = true
audit_log_paths = ["/var/log/audit/audit.log"]
audit_max_tail_bytes = 1048576
ebpf_bridge_enabled = true
ebpf_event_paths = ["/var/lib/vps-sentinel/ebpf-runtime.jsonl"]
ebpf_command = []
ebpf_runtime_probe_enabled = false
ebpf_runtime_probe_output_path = "/var/lib/vps-sentinel/ebpf-runtime.jsonl"
ebpf_runtime_probe_command = "bpftrace"
ebpf_runtime_probe_capture_files = false
command_timeout_seconds = 3

[external_rules]
enabled = true
sigma_paths = []
yara_enabled = true
yara_paths = []
yara_scan_roots = []
yara_command = "yara"
command_timeout_seconds = 10
max_file_size_mb = 16

[threat_intel]
enabled = true
indicator_paths = []
url = ""
api_key_env = ""
request_timeout_seconds = 5
cache_ttl_seconds = 3600

[fleet]
enabled = true
node_name = ""
export_path = "/var/lib/vps-sentinel/fleet-node.json"

[panel]
enabled = false
url = "" # Example: https://panel.example.com/api/v1/ingest
node_id = "" # Deprecated compatibility field; new panel uploads do not send node IDs
node_name = "" # Set a non-sensitive human-readable node name; do not use public IPs or private hostnames
secret = ""
min_severity = "Medium"
batch_size = 100
push_interval_seconds = 60
request_timeout_seconds = 60
outbox_max_items = 128
max_payload_bytes = 524288
privacy_mode = "strict" # strict removes node identity details and raw evidence; admin response datasets may still carry external public source IPs
ip_intel_paths = [] # Optional CSV files: cidr,country,asn,organization
ip_intel_max_entries = 20000
ip_intel_remote_enabled = true # Best-effort ASN/country/org enrichment for public external probe IPs
ip_intel_remote_endpoint = "whois.cymru.com:43"
ip_intel_remote_timeout_ms = 1200
ip_intel_remote_max_lookups = 64

[maintenance]
enabled = false
suppress_baseline_drift = true
suppress_interactive_logins = true
max_duration_seconds = 7200

[allowlist]
users = []
ips = []
process_paths = []
process_command_contains = []
listening_ports = []
file_paths = []
web_paths = []
